server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # SSE needs an unbuffered, long-lived connection — nginx buffers by
  # default, which silently breaks streaming if left on.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
